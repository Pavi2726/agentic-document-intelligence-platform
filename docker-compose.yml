services:
  # MongoDB - Chat History Storage
  mongodb:
    image: mongo:7.0
    container_name: agentic-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongopassword}
      MONGO_INITDB_DATABASE: document_intelligence
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - agentic-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis - Session Cache
  redis:
    image: redis:7-alpine
    container_name: agentic-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - agentic-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # PostgreSQL - Metadata Storage (Optional)
  postgres:
    image: postgres:16-alpine
    container_name: agentic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: document_intelligence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgrespassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agentic-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Neo4j - Knowledge Graph (Optional)
  neo4j:
    image: neo4j:5.21.0
    container_name: agentic-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4jpassword}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: 512M
      NEO4J_dbms_memory_pagecache_size: 256M
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - agentic-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agentic-backend
    restart: unless-stopped
    environment:
      # Groq API
      GROQ_API_KEY: ${GROQ_API_KEY}
      
      # MongoDB
      MONGO_URI: mongodb://admin:${MONGO_PASSWORD:-mongopassword}@mongodb:27017/
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispassword}
      
      # PostgreSQL
      POSTGRES_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgrespassword}@postgres:5432/document_intelligence
      
      # Neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4jpassword}
      
      # Application
      PROJECT_NAME: "Agentic Document Intelligence Platform"
      UPLOAD_DIR: /app/uploads
      VECTOR_STORE_DIR: /app/vector_store
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_vector_store:/app/vector_store
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - agentic-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agentic-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - agentic-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# Networks
networks:
  agentic-network:
    driver: bridge
    name: agentic-network

# Volumes
volumes:
  mongodb_data:
    name: agentic-mongodb-data
  mongodb_config:
    name: agentic-mongodb-config
  redis_data:
    name: agentic-redis-data
  postgres_data:
    name: agentic-postgres-data
  neo4j_data:
    name: agentic-neo4j-data
  neo4j_logs:
    name: agentic-neo4j-logs
  backend_uploads:
    name: agentic-backend-uploads
  backend_vector_store:
    name: agentic-backend-vector-store
